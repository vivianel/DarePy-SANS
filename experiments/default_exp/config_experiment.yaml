# ==========================================
# DAREPY-SANS CONFIGURATION
# ==========================================

analysis_paths:
  _desc: |
    ANALYSIS PATHS
    Tells the reduction pipeline where to find the raw data and save the results.
  project_base:
    C:/Users/lutzbueno_v/Documents/Analysis/DarePy-SANS_code/DarePy-SANS/experiments/2022_2358_MF_8mm_rest # Root directory for the config files and for saving the results
  raw_data:
    C:/Users/lutzbueno_v/Documents/Analysis/data/microfluidics/2022_2358_MF_8mm_rest/raw_data        # Source of HDF files
  scripts_dir:
    C:\Users\lutzbueno_v\Documents\Analysis\DarePy-SANS_code\DarePy-SANS                             # Location of source code = git repository
  dry_run: false         # If true = Check path availability without listing

instrument_setup:
  _desc: |
    INSTRUMENT SETUP
    Defines the physical conditions of your neutron scattering experiment.
  which_instrument: SANS-I # Backend selector ofr instrument: SANS-I or SANS-LLB

rename_samples:
  _desc: |
    RENAME SAMPLES
    Standardize sample names in metadata for correct downstream matching, especially for merging files.
  files_change: 83864   # Scan numbers to fix (e.g., 85776:89530, 89650)
  subscript: ''         # Append text. Write 'temp' for adding the auto-recorded temperature to the file name
  replace_with: 'test_name' # New label to overwrite the metadata name

plot_2d:
  _desc: |
    PLOT 2D PATTERNS
    Quick visualization of detector counts in 2D.
  list_scan: 83910         # Scans to visualize (e.g., 85776:89530, 89650)
  clim:                    # Intensity limits for colorbar [min, max]
  - 0
  - 5
  plot_scale: 'log'        # Color mapping: 'log' or 'lin'
  enable_bg_subtraction: false # Preview data minus a specific background scan
  background_scan_nr: 23088    # Scan number to subtract for 2D preview
  output_mode: 'frames'    # Export as animated 'gif' or individual 'frames'

beam_center_mask:
  _desc: |
    BEAM CENTER MASK
    Interactive tool for finding beam center and masking the beam stop.
  sample_name: 'AgBE' # sample used for the center
  scans:
    6.0: 83896
    18.0: 83879
    1.6: 83910
  scan_nr: 83910
pipeline_control:
  _desc: |
    PIPELINE CONTROL
    Master execution toggles for the DarePy-SANS.py script.
  live_monitoring: false # Auto-process new files as they appear at the beamline
  monitor_interval: 10   # Delay (sec) between checks for new raw data

transmission_setup:
  _desc: |
    TRANSMISSION CALCULATION
    Specific hardware settings for calculating sample attenuation.
  transmission_dist: 18.0       # Distance (m) used specifically for transmission measurements

physics_corrections:
  _desc: |
    PHYSICS CORRECTIONS FOR REDUCTION
    Toggles for standard SANS mathematical corrections.
  wavelength: auto               # Neutron wavelength in Ang. 'auto' reads HDF metadata
  target_detector_distances: all # Filter by distance (m): 'all' or list 1.6, 6.0
  normalize_to_monitor: true     # Account for primary beam flux fluctuations
  subtract_dark_current: true    # Subtract ambient noise and counts (Cadmium measurement)
  subtract_empty_cell: true      # Remove container scattering
  apply_flat_field: true         # Correct for detector pixel sensitivity (H2O)
  apply_transmission: true       # Correct for sample attenuation
  normalize_to_thickness: true   # Normalize by sample path length (cm)
  perform_absolute_scaling: true # Convert counts to absolute cross-section (cm-1)

calibration_samples:
  _desc: |
    CALIBRATION SAMPLES
    Keywords in raw data used to identify standard measurements.
  empty_beam: EB   # Direct beam run for Transmission calculation
  dark_current: Cd # Background noise run (Cadmium)
  water: H2O       # Standard used for absolute calibration (H2O)
  water_cell: EC   # Empty container for the water used as a standard for absolutre calibration
  empty_cell:
    default: EC    # Default container background for all samples
  thickness:       # Sample thickness (cm) per sample name
    default: 0.3   # Default value if sample name is not listed

    CTAB: 0.1
detector_geometry:
  _desc: |
    DETECTOR GEOMETRY
    Beam center (pixels) and beamstop coordinates per detector distance.
    Refresh the gui after the calculation with the iterative tool.
  beam_center_guess: # center  of the scattering pattern for a given detector distance in meters
    6.0:
    - 59.06
    - 64.03
    18.0:
    - 60.26
    - 63.84
    1.6:
    - 59.57
    - 64.17
  beamstopper_coordinates: # mask for beam stop coordinates and other regions for a given detector distance in meters
    6.0:
      bs0:
      - 57
      - 70
      - 53
      - 67
      bs1:
      - 0
      - 128
      - 122
      - 127
      bs2:
      - 0
      - 128
      - 124
      - 128
    18.0:
      bs0:
      - 57
      - 69
      - 52
      - 65
      bs1:
      - 57
      - 69
      - 61
      - 66
      bs2:
      - 0
      - 128
      - 119
      - 128
    1.6:
      bs0:
      - 56
      - 72
      - 51
      - 67
  transmission_coordinates: # ROI for calculating transmission counts, only needed for SANS-LLB due to the semi-transparent beam stop
    1.65:
    - 59
    - 68
    - 56
    - 70
    8.0:
    - 59
    - 67
    - 56
    - 69
analysis_flags:
  _desc: |
    ANALYSIS FLAGS
    Detailed integration settings.
  exclude_files: '85776:89530' # Scans to skip (e.g., bad data or setup runs)
  force_reintegrate: false    # True: Overwrite existing .dat files
  save_plot_radial: false     # Export I(q) plots as PNG
  integration_points: 120     # Number of bins in q-space
  sectors_nr: 18              # Number of 'pizza slices' for azimuthal integration
  save_plot_azimuthal: false  # Export I(phi) plots
  save_data_azimuthal: false  # Export I(phi) as text
  save_2d_patterns: false     # Save corrected 2D detector images
  pixel_range_azim: ''        # Radial range [min, max] for azimuthal integration, you can use more than one range

merging_settings:
  _desc: |
    MERGING SETTINGS
    Parameters for stitching multiple detector distances into one I(q) curve.
  run_step_1_plotting: true      # Preview individual curves before stitching
  run_step_2_merging: true        # Merge overlapping regions
  run_step_3_interpolation: false # Interpolate to common q-grid
  run_step_4_incoherent: false    # Fit and subtract flat incoherent background
  skip_start: # Points to trim from low-q end per distance
    18.0: 5
    1.6: 15
    6: 5
  skip_end:   # Points to trim from high-q end (noisy regions) per distance
    18.0: 25
    1.6: 5
    6: 25
  interp_type: log    # Resampling spacing: 'log' or 'lin'
  interp_points: 150  # Total points in final merged curve
  last_points_to_fit: 50 # Points used for Porod/Background estimation
