# ==========================================
# DAREPY-SANS CONFIGURATION
# ==========================================

analysis_paths:
  _desc: |
    ANALYSIS PATHS
    Tells the reduction pipeline where to find the raw data and save the results.
  project_base:
    C:/Users/lutzbueno_v/Documents/Analysis/DarePy-SANS_code/DarePy-SANS/experiments/2026_0915_coffee2     # Root directory for the config files and for saving the results
  raw_data:
    C:/Users/lutzbueno_v/Documents/Analysis/DarePy-SANS_code/DarePy-SANS/experiments/2026_0915_coffee2/raw_data # Source of HDF files
  scripts_dir:
    C:/Users/lutzbueno_v/Documents/Analysis/DarePy-SANS_code/DarePy-SANS                             # Location of source code = git repository
  dry_run: false         # If true = Check path availability without listing

instrument_setup:
  _desc: |
    INSTRUMENT SETUP
    Defines the physical conditions of your neutron scattering experiment.
  which_instrument: SANS-LLB # Backend selector ofr instrument: SANS-I or SANS-LLB

sample_environment:
  _desc: |
    SAMPLE ENVIRONMENT
    Defines additional values to save, depening on sample environment.
  water_bath: false # For saving the temperature (T_c) in the tables
  electromagnet: false # For saving the magnetic field (B_T) in the tables
  syringe_pumps: false # NOT IMPLEMENTED: For saving the flow rate (Q_mlps) in the tables
  rheometer: false # NOT IMPLEMENTED: For saving parameters of rheometer in the tables

rename_samples:
  _desc: |
    RENAME SAMPLES
    Standardize sample names in metadata for correct downstream matching, especially for merging files.
  files_change: 1436:1439 # Scan numbers to change name - Ex. 85776:89530, 89650
  add_subscript: 'test'     # Append text to the current name. Useful to add temperature or magnetic field, if forgotten during the measuments - Ex: '_25C'
  replace_with: 'NEW'       # Overwrites the name given during the measurements - Ex. 'CTAB_NaSal'

plot_2d:
  _desc: |
    PLOT 2D PATTERNS
    Quick visualization of detector counts in 2D.
  list_scan: 1433          # Scans to visualize (e.g., 85776:89530, 89650)
  clim:                    # Intensity limits for colorbar [min, max], lin is linear, log is orders of magnitude
  - 0.1
  - 5
  plot_scale: 'log'        # Color mapping: 'log' or 'lin'
  enable_bg_subtraction: false # Preview data minus a specific background scan
  background_scan_nr: 1434     # Scan number to subtract for 2D preview
  output_mode: 'individual_frames'  # Export as a 'gif_animation' or 'individual_frames'
  gif_fps: 2 #Frames per second to save the gif file
  play_once: false # false = gif will loop infinitely, true = gif will only play once


beam_center_mask:
  _desc: |
    MASKING & BEAM CENTER
    Interactive tool for finding beam center and masking the beam stop.
  scans:
    8: 1446
    17.5: 1450
    2: 1433
  semitransparent: false
  clim:                    # Intensity limits for colorbar [min, max], lin is linear, log is orders of magnitude
  - 0
  - 400
  plot_scale: 'lin'        # Color mapping: 'log' or 'lin'
  scan_nr: 1433

pipeline_control:
  _desc: |
    PIPELINE CONTROL
    Master execution toggles for the DarePy-SANS.py script.
  live_monitoring: false # Auto-process new files as they appear at the beamline
  monitor_interval: 10   # Delay (sec) between checks for new raw data

transmission_setup:
  _desc: |
    TRANSMISSION CALCULATION
    Specific hardware settings for calculating sample attenuation.
  beamstop: semitransparent # select the type of beamstop used. Options: semitransparent or standard
  empty_beam: EB   # Name or scan number of direct beam reference for Transmission calculation (needed for each distance as a reference for semitransparent)
  dist_trans_measurements: 17.5   # Distance (m) used for transmission measurements (needed ONLY for standard beamstop)



physics_corrections:
  _desc: |
    PHYSICS CORRECTIONS FOR REDUCTION
    Toggles for standard SANS mathematical corrections.
  wavelength: auto               # Neutron wavelength in Ang. 'auto' reads HDF metadata
  target_detector_distances: all # Filter by distance (m): 'all' or list 1.6, 6.0
  normalize_to_monitor: true     # Account for primary beam flux fluctuations
  subtract_dark_current: true    # Subtract ambient noise and counts (Cadmium measurement)
  subtract_empty_cell: true      # Remove container scattering
  apply_flat_field: true         # Correct for detector pixel sensitivity (H2O)
  apply_transmission: true        # Correct for sample attenuation
  normalize_to_thickness: true   # Normalize by sample path length (cm)
  perform_absolute_scaling: true  # Convert counts to absolute cross-section (cm-1)
  apply_resolution_smearing: false   # Toggle for calculating dq

resolution_settings:
  _desc: |
    RESOLUTION SETTINGS
    Geometric parameters for dq smearing. Automatically handles
    anisotropic smearing for azimuthal sector cuts.
  calculate_resolution: true    # true for calculating the experimental resolution
  # Source (A1) Settings - e.g., the neutron guide
  source_shape: 'rectangular'    # 'circular' or 'rectangular'
  source_slit_width: 0.05        # W1 in meters (e.g., 50 mm)
  source_slit_height: 0.05       # H1 in meters (e.g., 50 mm)
  source_aperture_radius: 0.009  # Fallback for circular

  # Sample (A2) Settings - e.g., the microfluidic channel
  aperture_shape: 'rectangular'  # 'circular' or 'rectangular'
  sample_slit_width: 0.0002      # W2 in meters (e.g., 200 um)
  sample_slit_height: 0.002      # H2 in meters (e.g., 2 mm)
  sample_aperture_radius: 0.004  # Fallback for circular

calibration_samples:
  _desc: |
    CALIBRATION SAMPLES
    Keywords in raw data used to identify standard measurements.
  dark_current: Cd # Background noise run (Cadmium)
  water: H2O       # Standard used for absolute calibration (H2O)
  water_cell: EC   # Empty container for the water used as a standard for absolutre calibration
  empty_cell:
    default: EC    # Default container background for all samples
  thickness:       # Sample thickness (cm) per sample name
    default: 0.1
detector_geometry:
  _desc: |
    DETECTOR GEOMETRY
    Beam center (pixels) and beamstop coordinates per detector distance.
    Refresh the gui after the calculation with the iterative tool.
  beam_center_guess: # center  of the scattering pattern for a given detector distance in meters
    8:
    - 62.91
    - 62.43
    17.5:
    - 62.43
    - 61.48
    2:
    - 62.77
    - 62.74
  beamstopper_coordinates: # mask for beam stop coordinates and other regions for a given detector distance in meters
    8:
      bs0:
      - 55
      - 71
      - 56
      - 70
    17.5:
      bs0:
      - 55
      - 69
      - 55
      - 69
      bs1:
      - 55
      - 69
      - 64
      - 70
    2:
      bs0:
      - 54
      - 70
      - 54
      - 70
      bs1:
      - 0
      - 6
      - 0
      - 128
      bs2:
      - 54
      - 89
      - 125
      - 128
      bs3:
      - 4
      - 128
      - 0
      - 2
  transmission_coordinates: # ROI for calculating transmission counts, only needed for SANS-LLB due to the semi-transparent beam stop
    8:
    - 57
    - 65
    - 56
    - 71
    17.5:
    - 59
    - 64
    - 56
    - 68
    2:
    - 59
    - 66
    - 55
    - 69
analysis_flags:
  _desc: |
    ANALYSIS FLAGS
    Detailed integration settings.
  exclude_files: '1457:1600' # Scans to skip (e.g., bad data or setup runs)
  force_reintegrate: true    # True: Overwrite existing .dat files
  save_plot_radial: false     # Export I(q) plots as PNG
  integration_points: 120     # Number of bins in q-space
  save_plot_azimuthal: false  # Export I(phi) plots
  save_data_azimuthal: false  # Export I(phi) as text
  sectors_nr: 18              # Number of 'pizza slices' for azimuthal integration
  pixel_range_azim: ''        # Radial range [[min, max], [min, max]] for azimuthal integration, you can use more than one range
  save_2d_patterns: false     # Save corrected 2D detector images


merging_settings:
  _desc: |
    MERGING SETTINGS
    Parameters for stitching multiple detector distances into one I(q) curve.
  run_step_1_plotting: true      # Preview individual curves before stitching
  skip_start: # Points to trim from low-q end per distance
    8: 20
    17.5: 3
    2: 0
  skip_end:   # Points to trim from high-q end (noisy regions) per distance
    8: 5
    17.5: 40
    2: 5

  run_step_2_merging: true        # Merge overlapping regions
  run_step_3_interpolation: false # Interpolate to common q-grid

  interp_type: log    # Resampling spacing: 'log' or 'lin'
  interp_points: 150  # Total points in final merged curve
  run_step_4_incoherent: true     # Fit and subtract flat incoherent background
  last_points_to_fit: 5 # Points used for Porod/Background estimation
