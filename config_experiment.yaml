# ==========================================
# DAREPY-SANS CONFIGURATION
# ==========================================

analysis_paths:
  _desc: |
    1. ANALYSIS PATHS
    Tells the pipeline where to find and save data.
    ALWAYS use absolute paths with forward slashes (/).
  project_base: 
    C:/Users/lutzbueno_v/Documents/Analysis/data/collaborations/Jasper/             # Root directory for results
  raw_data: 
    C:/Users/lutzbueno_v/Documents/Analysis/data/collaborations/Jasper/Jasper_data/raw_data/         # Source of HDF5/Nexus files
  scripts_dir: 
    C:/Users/lutzbueno_v/Documents/Analysis/data/collaborations/Jasper/Jasper_data/DarePy-SANS/            # Location of source code

instrument_setup:
  _desc: |
    2. INSTRUMENT SETUP
    Defines the physical conditions of your neutron scattering experiment.
  which_instrument: SANS-I # Backend selector: SANS-I or SANS-LLB

rename_samples:
  _desc: |
    3. RENAME SAMPLES
    Standardize sample names in metadata for correct downstream matching.
  files_change: 89582   # Scan numbers to fix (e.g., '85776:89530, 89650')
  subscript: ''         # Append text (use 'temp' for auto-recorded temperature)
  replace_with: 'test_name' # New label to overwrite the metadata name

plot_2d:
  _desc: |
    4. PLOT 2D PATTERNS
    Quick visualization of detector counts in 2D.
  list_scan: '89617:89622' # Scans to visualize (supports range shorthand)
  clim: 0, 5               # Intensity limits for colorbar [min, max]
  plot_scale: 'log'        # Color mapping: 'log' or 'lin'
  enable_bg_subtraction: false # Preview data minus a specific background scan
  background_scan_nr: 23088    # Scan number to subtract for 2D preview
  output_mode: 'frames'    # Export as animated 'gif' or individual 'frames'

beam_center_mask:
  _desc: |
    5. BEAM CENTER MASK
    Interactive tool for finding (0,0,0) and masking the beam stop.
  sample_name: 'AgBE'
  # The dictionary keys automatically define your available distances
  scans:
    1.6: 89580
    6.0: 89583
    18.0: 89585
    2.5: 0

pipeline_control:
  _desc: |
    6. PIPELINE CONTROL
    Master execution toggles for the DarePy-SANS.py script.
  dry_run: false         # True: Check file availability without calculating
  run_transmission: true # Calculate T for all samples
  run_reduction: true    # Perform the full I(q) reduction
  live_monitoring: false # Auto-process new files as they appear at the beamline
  monitor_interval: 10   # Delay (sec) between checks for new raw data

physics_corrections:
  _desc: |
    7. PHYSICS CORRECTIONS FOR REDUCTION
    Toggles for standard SANS mathematical corrections.
  wavelength: auto               # Neutron wavelength in Ang. 'auto' reads HDF5 metadata
  target_detector_distances: all # Filter by distance (m): 'all' or list [1.6, 6.0]
  transmission_dist: 18          # Distance used specifically for T measurements
  normalize_to_monitor: true     # Account for primary beam flux fluctuations
  subtract_dark_current: true    # Subtract ambient noise (Cadmium measurement)
  subtract_empty_cell: true      # Remove container scattering
  apply_flat_field: true         # Correct for detector pixel sensitivity (Plexi/H2O)
  apply_transmission: true       # Correct for sample attenuation
  normalize_to_thickness: true   # Normalize by sample path length (cm)
  perform_absolute_scaling: true # Convert counts to absolute cross-section (cm-1)

calibration_samples:
  _desc: |
    8. CALIBRATION SAMPLES
    Keywords in raw data used to identify standard measurements.
  empty_beam: EB   # Direct beam run for Transmission calculation
  dark_current: Cd # Background noise run (B4C or Cadmium)
  water: H2O       # Standard used for absolute calibration
  water_cell: EC   # Empty container for the water standard
  empty_cell:
    default: EC    # Default container background for all samples
    Test: EC
  thickness:       # Sample thickness (cm) per sample name
    KG_D2OdMCT_25wt: 0.1
    LG_D2OdMCT_50wt: 0.2
    default: 0.1   # Default value if sample name is not listed

    H2O: 0.2
    test: 0.2
    EC: 0.1
    Test: 0.6
detector_geometry:
  _desc: |
    9. DETECTOR GEOMETRY
    Beam center (pixels) and beamstopper coordinates per detector distance.
    Refresh the gui after the calculation with the iterative tool.
  beam_center_guess:
    6.0: 61.53, 65.23
    18.0: 59.68, 63.97
    1.6: 59.28, 64.62
    4.5: 69.23, 83.41
  beamstopper_coordinates:
    6.0:
      bs0: 57, 72, 52, 67    # [x_min, x_max, y_min, y_max]
      bs1: 0, 128, 122, 128
    18.0:
      bs0: 57, 71, 51, 67
      bs1: 0, 128, 120, 128
    1.6:
      bs0: 55, 73, 50, 69
    4.5:
      bs0: 57, 71, 51, 64
  transmission_coordinates: # ROI for calculating transmission counts
    1.65: 59, 68, 56, 70
    8.0: 59, 67, 56, 69

analysis_flags:
  _desc: |
    10. ANALYSIS FLAGS
    Detailed integration settings.
  exclude_files: '85776:89530' # Scans to skip (e.g., bad data or setup runs)
  force_reintegrate: false    # True: Overwrite existing .dat files
  save_plot_radial: false     # Export I(q) plots as PNG
  integration_points: 120     # Number of bins in q-space
  sectors_nr: 18              # Number of 'pizza slices' for azimuthal integration
  save_plot_azimuthal: false  # Export I(phi) plots
  save_data_azimuthal: false  # Export I(phi) as text
  save_2d_patterns: false     # Save corrected 2D detector images
  pixel_range_azim: ''        # Radial range [min, max] for azimuthal integration

merging_settings:
  _desc: |
    11. MERGING SETTINGS
    Parameters for stitching multiple detector distances into one I(q) curve.
  run_step_1_plotting: true      # Preview individual curves before stitching
  run_step_2_merging: false       # Merge overlapping regions
  run_step_3_interpolation: false # Interpolate to common q-grid
  run_step_4_incoherent: false    # Fit and subtract flat incoherent background
  skip_start: # Points to trim from low-q end per distance
    '18.0': 5
    '6.0': 10
    '1.6': 15
  skip_end:   # Points to trim from high-q end (noisy regions) per distance
    '18.0': 25
    '6.0': 25
    '1.6': 5
  interp_type: log    # Resampling spacing: 'log' or 'lin'
  interp_points: 150  # Total points in final merged curve
  last_points_to_fit: 50 # Points used for Porod/Background estimation
