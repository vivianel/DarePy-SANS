    - 69


# ==========================================
# 9. ANALYSIS FLAGS
# Fine-tuning for the integration process.
# ==========================================
analysis_flags:
  exclude_files: []          # List of scan numbers to completely ignore (e.g., [83901, 83902]).
  force_reintegrate: false   # If true, overwrites previously processed data. If false, skips to save time.
  plot_azimuthal: false
  plot_radial: false
  save_azimuthal: false
  save_2d_patterns: false
  pixel_range_azim:          # The radial range [min, max] for azimuthal integrations.
  - 10
  - 80
  integration_points: 120    # Number of q-bins for 1D radial integration.
  sectors_nr: 18             # Number of "pizza slices" for azimuthal integration.



# ==========================================
# 11. MERGING SETTINGS
# Settings for stitching different detector distances into a single 1D curve (caller_merging.py).
# ==========================================
merging_settings:
  run_step_1_analysis: true
  run_step_2_merging: false
  run_step_3_interpolation: false
  run_step_4_incoherent: false
  skip_start:                # Points to trim off the START of a curve before stitching to reduce noise.
    '18.0': 10
    '6.0': 5
    '1.6': 10
  skip_end:                  # Points to trim off the END of a curve before stitching to reduce noise.
    '18.0': 20
    '6.0': 40
    '1.6': 2
  interp_type: log           # Smoothing type for the stitched q-axis.
  interp_points: 150
  last_points_to_fit: 50     # How many high-q points to use for fitting the flat incoherent background (Porod).
