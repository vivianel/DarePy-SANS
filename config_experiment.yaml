# ==========================================
# 1. ANALYSIS PATHS
# Tells the pipeline where to find and save data. ALWAYS use absolute paths with forward slashes (/).
# ==========================================
analysis_paths:
  project_base:
    C:/Users/lutzbueno_v/Documents/Analysis/data/microfluidics/2022_2358_MF_1mm_rest/                       # where the results should be saved
  raw_data:
    C:/Users/lutzbueno_v/Documents/Analysis/data/microfluidics/2022_2358_MF_1mm_rest/raw_data/              # where the raw data is located
  scripts_dir:
    C:/Users/lutzbueno_v/Documents/Analysis/data/microfluidics/2022_2358_MF_1mm_rest/DarePy-SANS/            # where the scripts are saved

# ==========================================
# 2. RENAME SAMPLES
# Fix typos in sample names before processing to ensure correct matching.
# ==========================================
rename_samples:
  files_change: [None]      # List of scan numbers to modify.
  subscript: ''              # Text to append (use 'temp' to auto-append recorded temperature).
  replace_with: 'test_name'  # The brand-new sample name you want to use.

# ==========================================
# 3. PLOT 2D PATTERNS
# Settings for the plot_2Dpattern.py quick-visualization script.
# ==========================================
plot_2d:
  list_scan: [84489, 84240, 84239] # e.g., range(83907, 83911)
  clim: [0, 5]               # Color bar limits [min, max]
  plot_scale: 'log'          # Options: 'log' or 'lin'
  enable_bg_subtraction: false # Set true to preview data with background subtracted.
  background_scan_nr: 23088
  output_mode: 'frames'      # Options: 'gif' (animation) or 'frames' (individual images).

# ==========================================
# 4. BEAM CENTER MASK
# ==========================================
beam_center_mask:
  scan_nr: 84435           # The specific scan (e.g., AgBE or direct beam) to use for interactive masking.

# ==========================================
# 5. INSTRUMENT SETUP
# Defines the physical conditions of your neutron scattering experiment.
# ==========================================
instrument_setup:
  which_instrument: SANS-I         # MUST match the exact spelling in 'instrument_registry.yaml': Either SANS-I or SANS-LLB.

# ==========================================
# 6. PIPELINE CONTROL
# Orchestration settings for the Master Script (DarePy-SANS.py).
# in Yaml, the standard way to write booleans is entirely lowercase
# ==========================================
pipeline_control:
  dry_run: false             # Set true to verify paths/files without running heavy math.
  run_transmission: false
  run_reduction: true
  live_monitoring: false     # Set true at the beamline to auto-process new files.
  monitor_interval: 10       # Seconds to wait between checking for new files in live mode.

# ==========================================
# 7. PHYSICS CORRECTIONS FOR REDUCTION
# Data reduction toggles. Set to true to apply the correction, false to skip.
# in Yaml, the standard way to write booleans is entirely lowercase
# ==========================================
physics_corrections:
  wavelength: auto                 # Neutron wavelength in Å. 'auto' reads from HDF5, or type a number (e.g., 6.0).
  target_detector_distances: all   # Distances to process. Type 'all' or a list like [1.6, 6.0, 18.0].
  transmission_dist: 18            # Detector distance (in meters) used for transmission measurements.
  normalize_to_monitor: true
  subtract_dark_current: true
  subtract_empty_cell: true
  apply_flat_field: true
  apply_transmission: false
  normalize_to_thickness: true
  perform_absolute_scaling: true


# ==========================================
# 8. CALIBRATION SAMPLES
# Exact strings used in your raw data files to denote standard measurements.
# ==========================================
calibration_samples:
  empty_beam: EB                    # measurement used for empty beam (used for calculating the transmission)
  dark_current: Cd                  # corrcetion for the dark current (Cadmium)
  water: H2O                        # water measurement used for absolute calibration
  water_cell: EC                    # empty cell of the water measurement used for absolute calibration
  empty_cell:                      # Maps real sample names to their specific empty cell runs.
    CTAB: EC
    S_C_1mm: EC
    C_C_1mm: EC
    Slit_CTAB_8mm: EC
    Cont_CTAB_8mm: EC
    default: EC                    # Fallback if a sample isn't explicitly listed above.
  thickness:                       # Maps samples to their cell thickness in cm.
    CTAB: 0.1
    Cd: 0.1
    EC: 0.1
    H20: 0.1
    default: 0.3                   # Fallback if a sample isn't explicitly listed above.

# ==========================================
# 9. DETECTOR GEOMETRY
# PRO-TIP: You usually do NOT need to fill this out manually!
# Running 'mask_beamstop_center.py' automatically calculates and updates this section for you.
# Format: Boxes = [Ymin, Ymax, Xmin, Xmax] in pixels. Centers = [X, Y].
# ==========================================
detector_geometry:
  beam_center_guess:
    6.0:
    - 61.32
    - 64.34
    18.0:
    - 58.68
    - 63.2
    1.6:
    - 59.7
    - 64.28
  beamstopper_coordinates:
    6.0:
      bs0:
      - 57
      - 70
      - 53
      - 67
    18.0:
      bs0:
      - 57
      - 70
      - 53
      - 65
      bs1:
      - 0
      - 128
      - 118
      - 127
      bs2:
      - 0
      - 128
      - 122
      - 128
    1.6:
      bs0:
      - 56
      - 71
      - 51
      - 67
      bs1:
      - 56
      - 72
      - 50
      - 67
      bs2:
      - 56
      - 72
      - 54
      - 68
  transmission_coordinates:
    1.65:
    - 59
    - 68
    - 56
    - 70
    8.0:
    - 59
    - 67
    - 56
    - 69


# ==========================================
# 10. ANALYSIS FLAGS
# Fine-tuning for the integration process.
# ==========================================
analysis_flags:
  exclude_files: []          # List of scan numbers to completely ignore (e.g., [83901, 83902]).
  force_reintegrate: false   # If true, overwrites previously processed data. If false, skips to save time.
  plot_azimuthal: true
  plot_radial: true
  save_azimuthal: true
  save_2d_patterns: true
  pixel_range_azim:          # The radial ranges [min, max] for azimuthal integrations.
  - [10, 40]                 # Range 1 (Low q)
  - [50, 100]                # Range 2 (High q)
  integration_points: 120    # Number of q-bins for 1D radial integration.
  sectors_nr: 18             # Number of "pizza slices" for azimuthal integration.

# ==========================================
# 11. MERGING SETTINGS
# Settings for stitching different detector distances into a single 1D curve (caller_merging.py).
# ==========================================
merging_settings:
  run_step_1_analysis: true
  run_step_2_merging: true
  run_step_3_interpolation: false
  run_step_4_incoherent: false
  skip_start:                # Points to trim off the START of a curve before stitching to reduce noise.
    '18.0': 5
    '6.0': 10
    '1.6': 15
  skip_end:                  # Points to trim off the END of a curve before stitching to reduce noise.
    '18.0': 25
    '6.0': 25
    '1.6': 5
  interp_type: log           # Smoothing type for the stitched q-axis.
  interp_points: 150
  last_points_to_fit: 50     # How many high-q points to use for fitting the flat incoherent background (Porod).
